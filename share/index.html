<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shared with you — MyMacros & MyRecipes</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      max-width: 460px;
      margin: 0 auto;
      padding: 4rem 1.25rem;
      color: #1d1d1f;
      background: #ffffff;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #f5f5f7; background: #1c1c1e; }
      a { color: #4ea1ff; }
      .code { background: #2c2c2e; }
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    p { color: #86868b; }
    .btn {
      display: inline-block;
      margin: 1.25rem 0.3rem 0;
      padding: 0.85rem 1.6rem;
      border-radius: 14px;
      background: #1D9E75;
      color: #fff !important;
      font-weight: 600;
      text-decoration: none;
    }
    .btn.recipes { background: #4F7A4E; }
    .code {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.4rem 0.9rem;
      border-radius: 10px;
      background: #f2f2f7;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
    }
    .small { font-size: 0.85rem; margin-top: 2.5rem; }
  </style>
</head>
<body>
  <h1 id="headline">🥗 A meal was shared with you</h1>
  <p id="sub">Open it in <strong>MyMacros</strong> to add it to your meals.</p>
  <span id="buttons"></span>
  <p id="codeWrap" style="display:none">Or import this code in the app:<br>
    <span class="code" id="code"></span>
  </p>
  <p class="small" id="getApps">
    Don't have the apps yet? <strong>MyMacros</strong> (calorie &amp; macro
    tracker) and <strong>MyRecipes</strong> (recipe keeper) are free on the
    App&nbsp;Store and Play&nbsp;Store — install, then come back and tap the
    button above.
  </p>
  <script>
    var params = new URLSearchParams(location.search);
    var code = params.get('c') || '';
    var app = params.get('app') === 'recipes' ? 'recipes' : 'macros';
    var macrosLink = 'mymacros://share?c=' + encodeURIComponent(code);
    var recipesLink = 'myrecipes://share?c=' + encodeURIComponent(code);

    function btn(href, label, cls) {
      var a = document.createElement('a');
      a.className = 'btn' + (cls ? ' ' + cls : '');
      a.href = href;
      a.textContent = label;
      return a;
    }

    var buttons = document.getElementById('buttons');
    if (app === 'recipes') {
      // A recipe: lives in both apps — MyRecipes first.
      document.getElementById('headline').textContent = '🍲 A recipe was shared with you';
      document.getElementById('sub').innerHTML =
        'Open it in <strong>MyRecipes</strong> — or add it to your meals in <strong>MyMacros</strong>.';
      buttons.appendChild(btn(recipesLink, 'Open in MyRecipes', 'recipes'));
      buttons.appendChild(btn(macrosLink, 'Open in MyMacros'));
    } else {
      buttons.appendChild(btn(macrosLink, 'Open in MyMacros'));
    }

    if (code) {
      document.getElementById('code').textContent = code;
      document.getElementById('codeWrap').style.display = 'block';
      // Best effort: bounce straight into the primary app when installed.
      setTimeout(function () {
        location.href = app === 'recipes' ? recipesLink : macrosLink;
      }, 400);
    }
  </script>
</body>
</html>
